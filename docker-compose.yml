services:
  movie_mlflow:
    build:
      context: ./mlflow
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
      - ./shared:/app/shared
      - ./mlflow_data:/mlflow
    networks:
      - mlflow-net
    environment:
      - MLFLOW_SERVER_ALLOWED_HOSTS=*
    env_file:
      - .env
    command: >
      mlflow server
      --backend-store-uri=sqlite:////mlflow/mlflow.db
      --default-artifact-root=/app/models
      --host=0.0.0.0
      --port=5000
      --allowed-hosts=*


  movie_trainer_api:
    build:
      context: ./trainer
    container_name: trainer_api
    ports:
      - "8000:8000"
    depends_on:
      - movie_mlflow
    networks:
      - mlflow-net
    volumes:
      - ./models:/app/models
      - ./shared:/app/shared
    env_file:
      - .env
      
  movie_predicter_api:
    build:
      context: ./predicter
    container_name: predicter
    ports:
      - "8001:8000"
    depends_on:
      - movie_mlflow
    networks:
      - mlflow-net
    volumes:
      - ./models:/app/models
      - ./shared:/app/shared
    env_file:
      - .env

  knn_api:
    build:
      context: ./knn_api
      dockerfile: Dockerfile
    container_name: knn-api
    ports:
      - "8002:8000"
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./shared:/app/shared
    networks:
      - mlflow-net
    depends_on:
      - movie_mlflow
    restart: unless-stopped

  streamlit-ui:
    build: ./streamlit-ui
    container_name: recofilm-ui
    ports:
      - "8501:8501"
    environment:
      - KNN_API_URL=http://knn_api:8002/predict
      - SVD_API_URL=http://movie_trainer_api:8000/predict
      - SERVICE_TOKEN=knn-to-svd-secret
    networks:
      - mlflow-net
    depends_on:
      - knn_api
      - movie_predicter_api


  postgres:
    image: postgres:15
    container_name: airflow_postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    networks:
      - mlflow-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    build: ./airflow
    container_name: airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mlflow-net
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db migrate"
    restart: "no"

  airflow-api:
    build: ./airflow
    container_name: airflow_api
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - mlflow-net
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
    command: airflow api-server
    ports:
      - "8085:8080"

  airflow-scheduler:
    build: ./airflow
    container_name: airflow_scheduler
    depends_on:
      - airflow-api
    networks:
      - mlflow-net
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
    command: scheduler

    
volumes:
  postgres-db-volume:
  models:

networks:
  mlflow-net:
    driver: bridge

services:
  movie_mlflow:
    build:
      context: ./mlflow
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
      - ./shared:/app/shared
    networks:
      - mlflow-net
    environment:
      - MLFLOW_SERVER_ALLOWED_HOSTS=*
    command: >
      mlflow server
      --backend-store-uri=sqlite:///mlflow.db
      --default-artifact-root=/app/models
      --host=0.0.0.0
      --port=5000
      --allowed-hosts=*

  movie_trainer_api:
    build:
      context: ./trainer
    container_name: trainer_api
    ports:
      - "8000:8000"
    depends_on:
      - movie_mlflow
    networks:
      - mlflow-net
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
    volumes:
      - ./models:/app/models
      - ./shared:/app/shared
      
  movie_predicter_api:
    build:
      context: ./predicter
    container_name: predicter
    ports:
      - "8001:8000"
    depends_on:
      - movie_trainer_api
      - movie_mlflow
    networks:
      - mlflow-net
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
    volumes:
      - ./models:/app/models
      - ./shared:/app/shared

networks:
  mlflow-net:
    driver: bridge

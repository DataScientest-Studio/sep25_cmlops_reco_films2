docker-integration-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file for testing
        run: |
          echo "DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }}" > .env
          echo "MLFLOW_SERVER_ALLOWED_HOSTS=*" >> .env
          echo "MLFLOW_TRACKING_URI=http://mlflow:5000" >> .env

      - name: Build Docker images
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          docker compose build

      - name: Start services with docker-compose
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          docker compose up -d

      - name: Wait for services to be ready
        run: |
          sleep 45
          docker compose ps

      - name: Check logs for errors
        run: |
          docker compose logs trainer_api
          docker compose logs predicter
          docker compose logs mlflow

      - name: Test services are responding
        run: |
          curl -f http://localhost:8000/health || echo "Trainer API not responding"
          curl -f http://localhost:8001/health || echo "Predicter API not responding"
          curl -f http://localhost:5000/health || echo "MLflow not responding"

      - name: Cleanup - Stop and remove containers
        if: always()
        run: |
          docker compose down -v

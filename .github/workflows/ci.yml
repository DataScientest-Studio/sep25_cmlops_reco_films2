name: CI

on:
  push:
    branches: [ "projet-yms", "mergeProject" , "master" ]
  pull_request:
    branches: [ "projet-yms", "mergeProject", "master"  ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install --upgrade pip
          pip install flake8 black isort

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check code formatting with black
        run: |
          black --check .

      - name: Check import sorting with isort
        run: |
          isort --check-only --profile black .

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r trainer/requirements.txt
          pip install -r predicter/requirements.txt
          pip install -r mlflow/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          API_BEARER_TOKEN: ${{ secrets.API_BEARER_TOKEN }}
        run: |
          pytest ./trainer/test/test_api_trainer.py -v --cov --cov-report=term-missing

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker-integration-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          docker system prune -af || true
          docker builder prune -af || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file for testing
        run: |
          echo "DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }}" > .env
          echo "MLFLOW_TRACKING_URI=http://mlflow:5000" >> .env
          echo "MLFLOW_SERVER_ALLOWED_HOSTS=*" >> .env

      - name: Build Docker images
        run: |
          docker compose build

      - name: Start services with docker-compose
        run: |
          docker compose up -d

      - name: Wait for services to be ready
        run: |
          sleep 10
          timeout 30s docker compose logs -f || true

      - name: Check container status
        run: |
          docker compose ps

      - name: Show logs for all services
        if: always()
        run: |
          echo "=== Trainer API logs ==="
          docker compose logs movie_trainer_api || echo "No trainer logs"
          echo ""
          echo "=== Predicter API logs ==="
          docker compose logs movie_predicter_api || echo "No predicter logs"
          echo ""
          echo "=== MLflow logs ==="
          docker compose logs movie_mlflow || echo "No mlflow logs"

      - name: Test services are responding
        run: |
          echo "Testing trainer API..."
          curl -f http://localhost:8000/health || echo "⚠️ Trainer API not responding on port 8000"
          
          echo "Testing predicter API..."
          curl -f http://localhost:8001/health || echo "⚠️ Predicter API not responding on port 8001"
          
          echo "Testing MLflow..."
          curl -f http://localhost:5000/health || echo "⚠️ MLflow not responding on port 5000"

      - name: Cleanup - Stop and remove containers
        if: always()
        run: |
          docker compose down -v

  deploy-dockerhub:
    runs-on: ubuntu-latest
    needs: docker-integration-test

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & Push all images
        run: |
          IMAGE_TAG=${{ github.sha }}

          # MLflow
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/movie-mlflow:$IMAGE_TAG -t ${{ secrets.DOCKERHUB_USERNAME }}/movie-mlflow:latest ./mlflow
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/movie-mlflow:$IMAGE_TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/movie-mlflow:latest

          # Trainer API
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/movie-trainer:$IMAGE_TAG -t ${{ secrets.DOCKERHUB_USERNAME }}/movie-trainer:latest ./trainer
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/movie-trainer:$IMAGE_TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/movie-trainer:latest

          # Predicter API
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/movie-predicter:$IMAGE_TAG -t ${{ secrets.DOCKERHUB_USERNAME }}/movie-predicter:latest ./predicter
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/movie-predicter:$IMAGE_TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/movie-predicter:latest

          # KNN API
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/movie-knn:$IMAGE_TAG -t ${{ secrets.DOCKERHUB_USERNAME }}/movie-knn:latest ./knn_api
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/movie-knn:$IMAGE_TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/movie-knn:latest

          # Streamlit UI
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/movie-ui:$IMAGE_TAG -t ${{ secrets.DOCKERHUB_USERNAME }}/movie-ui:latest ./streamlit-ui
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/movie-ui:$IMAGE_TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/movie-ui:latest
